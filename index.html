<!DOCTYPE html>
<html>
    <head>
        <title>Registro de la persona Usuaria</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Registro de la persona Usuaria</h1>
            
        <form class="formulario">
            
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required><br><br>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required><br><br>
            
            <label for="descripcion">Describete brevemente:</label>
            <textarea id="descripcion" name="descripcion" rows="4" cols="50"></textarea><br><br>
        </form>    
        
            <h2>Cuales son tus intereses</h2>
            
        <form class="formulario">
            <label for="intereses">Selecciona tus intereses:</label><br><br>

            <label for="tecnologia">Tecnología</label>
            <input type="checkbox" id="tecnologia" name="tecnologia"><br><br>

            <label for="arte">Arte</label>
            <input type="checkbox" id="arte" name="arte"><br><br>

            <label for="deporte">Deporte</label>
            <input type="checkbox" id="deporte" name="deporte"><br><br>

            <label for="video">Video juegos</label>
            <input type="checkbox" id="video" name="video"><br><br>

            <input type="submit" value="Registrar" id="submit-button">
        </form>
    </body>
</html>
